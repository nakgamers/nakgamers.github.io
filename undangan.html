<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1c1917; color: #d6d3d1; font-family: 'Montserrat', sans-serif;">
            <i class="fa-solid fa-heart fa-bounce" style="font-size: 2.5rem; margin-bottom: 1rem; color: #a8a29e;"></i>
            <p style="letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.875rem;">Memuat Undangan...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isOpened, setIsOpened] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [copiedDana, setCopiedDana] = useState(false);
            const [copiedBri, setCopiedBri] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [guestName, setGuestName] = useState("Tamu Undangan");
            
            const [isProfileLoaded, setIsProfileLoaded] = useState(false);
            
            const audioRef = useRef(null);

            const karikaturImage = "https://i.ibb.co.com/WNfcY3Rr/task-01kk4fseagfxj8znpk4tt6e0r9-1772898564-img-0.webp";
            const targetDate = new Date('2026-04-18T08:00:00+07:00').getTime();

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const nameFromUrl = params.get('namatamu') || params.get('to');
                if (nameFromUrl) {
                    setGuestName(decodeURIComponent(nameFromUrl));
                }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;

                    if (distance < 0) {
                        clearInterval(timer);
                        return;
                    }

                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000),
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, [targetDate]);

            const handleOpen = () => {
                setIsOpened(true);
                if (audioRef.current) {
                    const playPromise = audioRef.current.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.then(_ => {
                            setIsPlaying(true);
                        })
                        .catch(error => {
                            console.error("Gagal memutar audio:", error);
                            setIsPlaying(false);
                        });
                    }
                }
            };

            const toggleAudio = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    } else {
                        const playPromise = audioRef.current.play();
                        if (playPromise !== undefined) {
                            playPromise.then(_ => {
                                setIsPlaying(true);
                            }).catch(error => {
                                console.error("Gagal memutar audio:", error);
                            });
                        }
                    }
                }
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    if (type === 'dana') {
                        setCopiedDana(true);
                        setTimeout(() => setCopiedDana(false), 2000);
                    } else {
                        setCopiedBri(true);
                        setTimeout(() => setCopiedBri(false), 2000);
                    }
                } catch (err) {
                    console.error('Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="bg-[#fcfaf8] text-stone-800 font-sans min-h-screen relative overflow-x-hidden animate-fade-in-up">
                    
                    {/* Background Audio - Menggunakan lagu Andmesh - Anugerah Terindah */}

    <source src="https://nandz.my.id/Andmesh_-_Anugerah_Terindah_CeeNaija.com_.mp3" type="audio/mpeg" />
    <source src="./lagu.mp3" type="audio/mpeg" />
</audio>

                    {/* Floating Audio Button */}
                    {isOpened && (
                        <button 
                            onClick={toggleAudio}
                            className="fixed bottom-6 right-6 z-50 bg-stone-800/80 text-white w-12 h-12 rounded-full shadow-lg backdrop-blur-sm transition-transform hover:scale-110 flex items-center justify-center"
                        >
                            {isPlaying ? <i className="fa-solid fa-music animate-pulse"></i> : <i className="fa-solid fa-pause"></i>}
                        </button>
                    )}

                        <img 
                            src={karikaturImage} 
                            alt="Cover Background"

                        />

                                <h1 className="font-script text-6xl md:text-8xl mb-8 drop-shadow-lg text-white">Julia & Yusuf</h1>
                                
                                <div className="mb-12 drop-shadow-md">
                                    <p className="text-sm font-light mb-2 text-stone-200">Kepada Yth. Bapak/Ibu/Saudara/i</p>
                                    <p className="font-serif text-3xl font-semibold border-b border-white/40 pb-2 inline-block px-8 text-white capitalize min-w-[200px]">
                                        {guestName}
                                    </p>
                                    <p className="text-xs font-light mt-4 italic text-stone-300">
                                        *Mohon maaf bila ada kesalahan penulisan nama/gelar
                                    </p>
                                </div>

                                <button 
                                    onClick={handleOpen}
                                    className="flex items-center justify-center gap-2 bg-white text-stone-800 px-8 py-3 rounded-full font-medium tracking-wide hover:bg-stone-100 transition-all duration-300 mx-auto shadow-2xl transform hover:-translate-y-1 hover:scale-105"
                                >
                                    <i className="fa-solid fa-heart text-rose-500"></i>
                                    Buka Undangan
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}

                        {/* HERO SECTION DENGAN ORNAMEN FLORAL */}

                            <div className="floral-bg-top"></div>
                            <div className="floral-bg-bottom"></div>
                            
                            <div className="z-10 animate-fade-in-up">
                                <p className="text-stone-500 tracking-[0.2em] text-sm uppercase mb-4">Pernikahan Kami</p>
                                <h1 className="font-script text-7xl md:text-9xl text-stone-800 mb-6 drop-shadow-sm">Julia & Yusuf</h1>
                                <p className="font-serif text-xl md:text-2xl text-stone-600 mb-12">18 . 04 . 2026</p>
                                
                                <div className="animate-bounce mt-12">
                                    <i className="fa-solid fa-arrow-down text-stone-400 text-2xl"></i>
                                </div>
                            </div>
                        </section>

                        {/* QUOTE SECTION */}
                        <section className="py-20 px-6 max-w-3xl mx-auto text-center relative z-10">
                            <i className="fa-solid fa-heart text-[#a9b59a] text-3xl mb-6 opacity-60"></i>
                            <h2 className="font-serif text-3xl font-semibold mb-8 text-stone-800">Maha Suci Allah</h2>
                            <p className="text-stone-600 leading-relaxed font-light mb-6 text-sm md:text-base">
                                "Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan untukmu isteri-isteri dari jenismu sendiri, supaya kamu cenderung dan merasa tenteram kepadanya, dan dijadikan-Nya diantaramu rasa kasih dan sayang. Sesungguhnya pada yang demikian itu benar-benar terdapat tanda-tanda bagi kaum yang berfikir."
                            </p>
                            <p className="font-serif font-medium text-stone-500">(QS. Ar-Rum: 21)</p>
                        </section>

                        {/* PROFILE SECTION DENGAN KARIKATUR & ORNAMEN */}
                        <section className="py-20 px-6 relative bg-white">
                            <div className="floral-bg-top opacity-30"></div>
                            <div className="max-w-5xl mx-auto relative z-10">
                                <div className="text-center mb-16">
                                    <h2 className="font-serif text-4xl font-semibold mb-4 text-stone-800">Mempelai</h2>
                                    <p className="text-stone-500 font-light max-w-xl mx-auto text-sm md:text-base">
                                        Dengan memohon rahmat dan ridha Allah SWT, kami bermaksud menyelenggarakan pernikahan putra-putri kami:
                                    </p>
                                </div>

                                <div className="flex flex-col items-center justify-center">
                                    <div className="w-64 h-64 md:w-80 md:h-80 rounded-full border-[10px] border-[#f4f1ed] shadow-2xl overflow-hidden mb-12 relative bg-stone-200 flex items-center justify-center z-20">
                                        {!isProfileLoaded && (
                                            <i className="fa-solid fa-circle-notch fa-spin text-stone-400 text-3xl absolute"></i>
                                        )}
                                        <img 
                                            src={karikaturImage} 
                                            alt="Karikatur Julia & Yusuf" 
                                            loading="lazy"
                                            onLoad={() => setIsProfileLoaded(true)}

                                        />

                                    <div className="flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 w-full relative z-10">
                                        <div className="text-center flex-1 flex flex-col items-center">
                                            <h3 className="font-script text-4xl md:text-5xl mb-2 text-stone-800">Julianita Nurhasanah</h3>
                                            <p className="font-serif text-lg font-semibold mb-2 text-[#8c9c7d]">Panggilan: Julia</p>

                                                Putri dari<br/>
                                                <span className="font-medium text-stone-700">Bapak Juju Junaedi & Ibu Nuriah</span>
                                            </p>
                                            <a href="https://instagram.com/jlyanta_nrhaa" target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 text-sm text-[#8c9c7d] hover:text-stone-800 transition-colors">
                                                <i className="fa-brands fa-instagram"></i> @jlyanta_nrhaa
                                            </a>
                                        </div>

                                        <div className="font-script text-5xl md:text-6xl text-[#d4dacb] my-4 md:my-0">&</div>

                                        <div className="text-center flex-1 flex flex-col items-center">
                                            <h3 className="font-script text-4xl md:text-5xl mb-2 text-stone-800">Yusuf Al-Aziz S.Pd</h3>
                                            <p className="font-serif text-lg font-semibold mb-2 text-[#8c9c7d]">Panggilan: Yusuf</p>
                                            <p className="text-sm text-stone-500 font-light mb-4">
                                                Putra dari<br/>
                                                <span className="font-medium text-stone-700">Bapak H. Udin Zaenudin B S.Pd &<br/>Ibu Hj. Yuyun Kania S.Pd (Almh)</span>
                                            </p>
                                            <a href="https://instagram.com/__markucup__" target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 text-sm text-[#8c9c7d] hover:text-stone-800 transition-colors">
                                                <i className="fa-brands fa-instagram"></i> @__markucup__
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* EVENT DETAILS & COUNTDOWN */}
                        <section className="py-20 px-6 relative bg-[#fcfaf8]">
                            <div className="floral-bg-bottom opacity-40"></div>
                            <div className="max-w-4xl mx-auto text-center relative z-10">
                                <h2 className="font-serif text-4xl font-semibold mb-4 text-stone-800">Waktu & Tempat</h2>
                                <p className="text-stone-500 font-light mb-12">Momen bahagia yang sangat kami nantikan</p>

                                <div className="flex justify-center gap-3 md:gap-6 mb-16">
                                    {[
                                        { label: 'Hari', value: timeLeft.days },
                                        { label: 'Jam', value: timeLeft.hours },
                                        { label: 'Menit', value: timeLeft.minutes },
                                        { label: 'Detik', value: timeLeft.seconds },
                                    ].map((time, idx) => (
                                        <div key={idx} className="glass-card shadow-lg rounded-2xl w-[70px] h-[85px] md:w-24 md:h-28 flex flex-col items-center justify-center">
                                            <span className="font-serif text-2xl md:text-4xl font-semibold text-[#6e7d60]">{time.value}</span>
                                            <span className="text-[9px] md:text-xs tracking-widest uppercase text-stone-500 mt-1">{time.label}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid md:grid-cols-2 gap-8">

                                                </div>
                                            </div>
                                            <div className="flex items-start gap-4">
                                                <i className="fa-regular fa-clock text-[#8c9c7d] mt-1 w-5"></i>
                                                <div className="text-left">
                                                    <p className="font-medium text-stone-700">08:00 WIB</p>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-4">
                                                <i className="fa-solid fa-location-dot text-[#8c9c7d] mt-1 w-5"></i>
                                                <div className="text-left">
                                                    <p className="font-medium text-stone-700">Kediaman Mempelai Wanita</p>
                                                    <p className="text-sm text-stone-500 font-light mt-1">Kp. Cikeler, Desa Padamulya, Kec. Angsana, Kab. Pandeglang, Banten</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="glass-card rounded-3xl p-6 md:p-8 shadow-xl flex flex-col h-full hover:shadow-2xl transition-shadow duration-300">
                                        <h3 className="font-serif text-2xl font-bold mb-6 border-b border-stone-200 pb-4 text-stone-800">Resepsi</h3>
                                        <div className="space-y-4 mb-8 flex-grow">
                                            <div className="flex items-start gap-4">
                                                <i className="fa-regular fa-calendar text-[#8c9c7d] mt-1 w-5"></i>
                                                <div className="text-left">
                                                    <p className="font-medium text-stone-700">Sabtu, 18 April 2026</p>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-4">
                                                <i className="fa-regular fa-clock text-[#8c9c7d] mt-1 w-5"></i>

                                                </div>
                                            </div>

                                                <i className="fa-solid fa-location-dot text-[#8c9c7d] mt-1 w-5"></i>
                                                <div className="text-left">

                        {/* LOVE STORY SECTION */}
                        <section className="py-20 bg-white px-6 relative">
                            <div className="floral-bg-top opacity-20"></div>
                            <div className="max-w-3xl mx-auto relative z-10">

                                    <div className="mb-12 relative flex items-center md:justify-between w-full">
